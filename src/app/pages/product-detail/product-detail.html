<div class="bg-surface-light dark:bg-surface-dark min-h-screen py-10 transition-colors duration-300 font-sans">
  <!-- Navigation -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-8">
    <a routerLink="/products" class="inline-flex items-center text-sm font-medium text-gray-500 hover:text-brand-primary dark:text-gray-400 dark:hover:text-brand-accent transition-colors group">
      <svg class="w-5 h-5 mr-1 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Back to Products
    </a>
  </div>

  @if(isLoading) {
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col md:flex-row gap-12 lg:gap-20 animate-pulse">
        <div class="w-full md:w-1/2 aspect-square bg-gray-200 dark:bg-gray-800 rounded-3xl"></div>
        <div class="w-full md:w-1/2 py-8 mt-4">
           <div class="h-6 w-24 bg-gray-200 dark:bg-gray-800 rounded-full mb-6"></div>
           <div class="h-10 w-3/4 bg-gray-200 dark:bg-gray-800 rounded mb-4"></div>
           <div class="h-8 w-1/4 bg-gray-200 dark:bg-gray-800 rounded mb-8"></div>
           <div class="h-4 w-full bg-gray-200 dark:bg-gray-800 rounded mb-3"></div>
           <div class="h-4 w-5/6 bg-gray-200 dark:bg-gray-800 rounded mb-3"></div>
           <div class="h-4 w-4/6 bg-gray-200 dark:bg-gray-800 rounded mb-10"></div>
           <div class="h-14 w-1/2 bg-gray-200 dark:bg-gray-800 rounded-full"></div>
        </div>
      </div>
    </div>
  } @else if(product) {
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-24">
      <div class="flex flex-col md:flex-row gap-12 lg:gap-20 items-center">
        <!-- Image Gallery section -->
        <div class="w-full md:w-1/2 pdp-image-container group relative">
          <div class="absolute inset-0 bg-brand-primary/10 dark:bg-brand-accent/10 rounded-3xl transform -rotate-3 scale-105 opacity-0 group-hover:opacity-100 transition-all duration-700 blur-xl"></div>
          <div class="relative aspect-[4/5] md:aspect-square overflow-hidden rounded-3xl shadow-xl dark:shadow-2xl dark:shadow-black/50 border border-gray-100 dark:border-gray-800 bg-white dark:bg-surface-dark-alt z-10 transition-transform duration-500">
            <img [src]="product.image" [alt]="product.name" class="w-full h-full object-cover origin-center transition-transform duration-700 hover:scale-110" />
          </div>
        </div>

        <!-- Product Info section -->
        <div class="w-full md:w-1/2 flex flex-col justify-center">
          <div class="pdp-badge mb-6 inline-flex">
            <span class="px-3 py-1 text-xs font-semibold tracking-wider uppercase bg-brand-primary/10 text-brand-primary dark:bg-brand-accent/10 dark:text-brand-accent rounded-full border border-brand-primary/20 dark:border-brand-accent/20">
              {{product.category}}
            </span>
          </div>
          
          <h1 class="pdp-title text-4xl md:text-5xl lg:text-6xl font-extrabold text-gray-900 dark:text-white leading-tight mb-4 tracking-tight drop-shadow-sm">
            {{product.name}}
          </h1>
          
          <div class="pdp-price text-3xl font-light text-gray-900 dark:text-gray-100 mb-8 flex items-baseline">
            <span class="text-xl font-medium text-gray-500 mr-1">$</span>{{product.price}}
          </div>
          
          <p class="pdp-desc text-lg text-gray-600 dark:text-gray-300 leading-relaxed mb-10 max-w-xl">
            {{product.description}}
          </p>
          
          <div class="pdp-features grid grid-cols-2 gap-4 mb-10">
            <div class="flex items-center text-sm text-gray-700 dark:text-gray-300 bg-gray-50 dark:bg-gray-800/50 p-4 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm hover:shadow-md transition-shadow">
              <svg class="w-5 h-5 text-green-500 mr-3 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
              <span class="font-medium">100% Organic</span>
            </div>
            <div class="flex items-center text-sm text-gray-700 dark:text-gray-300 bg-gray-50 dark:bg-gray-800/50 p-4 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm hover:shadow-md transition-shadow">
              <svg class="w-5 h-5 text-green-500 mr-3 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
              <span class="font-medium">Sun-dried</span>
            </div>
            <div class="flex items-center text-sm text-gray-700 dark:text-gray-300 bg-gray-50 dark:bg-gray-800/50 p-4 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm hover:shadow-md transition-shadow">
              <svg class="w-5 h-5 text-green-500 mr-3 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
              <span class="font-medium">No Preservatives</span>
            </div>
            <div class="flex items-center text-sm text-gray-700 dark:text-gray-300 bg-gray-50 dark:bg-gray-800/50 p-4 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm hover:shadow-md transition-shadow">
              <svg class="w-5 h-5 text-green-500 mr-3 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
              <span class="font-medium">Premium Quality</span>
            </div>
          </div>
          
          <div class="pdp-action flex gap-4">
            <button class="flex-1 relative overflow-hidden bg-brand-primary text-white font-bold py-4 px-8 rounded-full shadow-[0_0_20px_rgba(var(--tw-colors-brand-primary),0.4)] hover:shadow-[0_0_30px_rgba(var(--tw-colors-brand-primary),0.6)] transition-all duration-300 transform hover:-translate-y-1 hover:scale-[1.02] active:scale-[0.98] outline-none group">
              <span class="relative z-10 flex items-center justify-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                Add to Cart
              </span>
              <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
            </button>
            <button class="p-4 rounded-full border-2 border-gray-200 dark:border-gray-700 text-gray-400 hover:text-red-500 hover:border-red-500 dark:hover:text-red-400 dark:hover:border-red-400 transition-all duration-300 hover:bg-red-50 dark:hover:bg-red-900/20" aria-label="Add to Wishlist">
              <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" stroke="currentColor" stroke-width="0"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  }
</div>
